<!DOCTYPE html>
<html lang="en">
<head>
  <!-- daisyui -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- icon  -->
 <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
<!-- fontawesome  -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

 <!-- font  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<style>
  *{
      font-family: "Geist", sans-serif;
  }
</style>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Github Issue Tracker/sign up</title>
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-100">


 <div class="w-full max-w-md p-8 bg-white border border-gray-300 rounded-xl shadow-xl ">
    <header class="text-center mb-6">
      <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16 mx-auto mb-4">
      <h1 class="text-2xl font-semibold">GitHub Issues Tracker</h1>
      <p class="text-gray-500 mt-2 text-[16px] font-normal">Sign in to manage your issues</p>
    </header>

  
    <fieldset class="fieldset">
    <legend class="fieldset-legend text-[#1F2937] text-[16px] font-medium">Username</legend>
    <input id="username" type="text"  class="input w-full" placeholder="Enter your username" autocomplete="off"/>
    <p class="text-sm text-[#4A00FF] mt-1">Default: admin</p>
</fieldset>

      <fieldset class="fieldset">
        <legend class="fieldset-legend text-[#1F2937] text-[16px] font-medium">Password</legend>
        <input id="password" type="password"  class="input w-full" placeholder="Enter your password" />
        <p class="text-sm text-[#4A00FF] mt-1">Default: admin123</p>
      </fieldset>

      <button  onclick="signin()" class="btn btn-primary bg-[#4A00FF] border-none w-full">Sign In</button>
<div class="flex items-center my-4">
  <div class="flex-grow border-t border-gray-300"></div>
  <span class="px-4 text-gray-500">OR</span>
  <div class="flex-grow border-t border-gray-300"></div>
   
</div>
 <h3 class="opacity-40 text-center">Demo Cardinals</h3>
  
      <div class="bg-gray-200 p-5 rounded-xl mt-5 text-center">
      
        <p><span class="font-semibold">Username:</span> admin</p>
        <p><span class="font-semibold">Password:</span> admin123</p>

      </div>
    
  </div>







  <script src="javascript/signup.js"></script>
</body>
</html>
