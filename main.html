<!DOCTYPE html>
<html lang="en">
<head>
  <!-- daisyui -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- icon  -->
 <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
<!-- fontawesome  -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

 <!-- font  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<style>
  *{
      font-family: "Geist", sans-serif;
  }
</style>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Github Issue Tracker</title>
</head>
<body class="bg-[#F8FAFC]">
 

<!-- nav  -->

 <header>

    <div class="navbar flex-col gap-5 md:flex-row bg-base-100 shadow-sm px-4 bg-white">
    <div class="flex-1 flex items-center gap-2">
      <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-10 h-10">
      <h1 class="md:text-2xl text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</h1>
    </div>
    <div class="flex items-center gap-3">
      <div class="relative">
        <input id="input_issue" type="search" placeholder="Search issues"
               class="input input-bordered pl-10 pr-4 w-64 rounded-lg" />
        <svg class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 opacity-50 text-gray-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <circle cx="11" cy="11" r="8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M21 21l-4.3-4.3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="dropdown dropdown-end">
        <label tabindex="0" class="btn bg-primary bg-[#4A00FF] text-white whitespace-nowrap">
        <i class="fa-solid fa-plus ml-1"></i>  New Issue 
        </label>

      </div>
    </div>
  </div>
</header>





<main class="max-w-11/12 m-auto">
<!-- button section -->

<div class="mt-14 mb-4 flex justify-center md:justify-start lg:justify-start gap-1 bg-white p-5 shadow-[0_1px_6px_0_rgba(0,0,0,0.08)] m-auto rounded-lg">
<button id="all_btn" onclick="indicator('all_btn')" class="btn px-6 py-3 font-normal bg-primary bg-[#4A00FF] text-white">All</button>
<button id="open_btn" onclick="indicator('open_btn')" class="btn px-6 py-3 font-normal text-[#64748B] bg-white">Open</button>
<button id="close_btn" onclick="indicator('close_btn')" class="btn px-6 py-3 font-normal text-[#64748B] bg-white">Closed</button>
</div>

<!-- heading -->
 <div class=" bg-white p-5 flex-col md:flex-row shadow-[0_1px_6px_0_rgba(0,0,0,0.08)] m-auto flex items-start md:items-center justify-between gap-5 rounded-lg">
  <div class="w-13 h-13 rounded-full bg-[#ECE4FF] flex items-center justify-center">
    <img src="./assets/Aperture.png" alt="" class="w-6 h-6">
  </div>

  <div id="display_number" class="flex-1">
  
  </div>

  <div class="flex gap-2 items-center">
    <i class="fa-solid fa-circle text-green-400 text-sm"></i>
    <span>Open</span>
  </div>

  <div class="flex gap-2 items-center">
    <i class="fa-solid fa-circle text-[#A855F7] text-sm"></i>
    <span>Closed</span>
  </div>
</div>
<!-- loader -->
<div id="spin" class="items-center justify-center my-5 hidden">
<progress class="progress w-1/2 text-primary"></progress>

</div>
<!-- issue card -->

<div id="card_sec" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 p-5">
    
 <!-- js -->
  </div>

<!-- Open modal -->

<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
        <div id="modal_info">

         </div>
    <div  class="modal-action">
      <form method="dialog">
      <button class="btn btn-primary outline-0">Close</button>
      </form>
    </div>
  </div>
</dialog>


</main>



















  <script src="javascript/main.js"></script>
</body>
</html>
